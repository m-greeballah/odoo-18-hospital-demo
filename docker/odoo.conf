[options]
; ============================================================
; Odoo 18 — Custom Configuration for Hospital Demo
; ============================================================

; Server
addons_path = /mnt/extra-addons,/usr/lib/python3/dist-packages/odoo/addons
data_dir = /var/lib/odoo

; Database
db_host = db
db_port = 5432
db_user = odoo
db_password = odoo
db_name = False

; HTTP
http_interface = 0.0.0.0
http_port = 8069
proxy_mode = True

; Workers (set > 0 in production)
workers = 0

; Logging
log_level = info
log_handler = :INFO

; Security
list_db = True
; admin_passwd is injected at runtime via --admin-passwd CLI flag (see docker-compose.yml)

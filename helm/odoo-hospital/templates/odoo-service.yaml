apiVersion: v1
kind: Service
metadata:
  name: {{ include "odoo-hospital.fullname" . }}-odoo
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "odoo-hospital.labels" . | nindent 4 }}
    app.kubernetes.io/component: application
spec:
  type: {{ .Values.odoo.service.type }}
  selector:
    {{- include "odoo-hospital.odooSelectorLabels" . | nindent 4 }}
  ports:
    - name: http
      port: {{ .Values.odoo.service.port }}
      targetPort: http
      protocol: TCP
    - name: longpolling
      port: {{ .Values.odoo.service.longpollingPort }}
      targetPort: longpolling
      protocol: TCP

apiVersion: v1
kind: Secret
metadata:
  name: {{ include "odoo-hospital.secretName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "odoo-hospital.labels" . | nindent 4 }}
  annotations:
    # Prevent ArgoCD from detecting secret drift (values managed externally)
    argocd.argoproj.io/compare-options: IgnoreExtraneous
type: Opaque
stringData:
  POSTGRES_USER: {{ .Values.secrets.postgresUser | quote }}
  POSTGRES_DB: {{ .Values.secrets.postgresDb | quote }}
  POSTGRES_PASSWORD: {{ .Values.secrets.postgresPassword | required "secrets.postgresPassword is required" | quote }}
  ODOO_MASTER_PASSWD: {{ .Values.secrets.odooMasterPassword | required "secrets.odooMasterPassword is required" | quote }}
